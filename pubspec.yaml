name: tarot_coach
description: "TarotCoach - L'assistant intelligent pour vos parties de Tarot français"
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.4
  flutter_animate: ^4.5.2
  google_fonts: ^8.1.0
  syncfusion_flutter_pdfviewer: ^33.2.10
  share_plus: ^10.1.4
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  google_mobile_ads: ^5.3.1
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  remove_alpha_ios: true
  background_color_ios: "#1B5E20"

# Splash screen natif : fond vert uni, sans logo
# (l'animation "Coach Tarot" est ensuite affichee par _SplashGate dans main.dart)
flutter_native_splash:
  color: "#1B5E20"
  color_dark: "#1B5E20"
  android_12:
    color: "#1B5E20"
    color_dark: "#1B5E20"

flutter:
  uses-material-design: true
  assets:
    - assets/rules/
    - assets/images/
