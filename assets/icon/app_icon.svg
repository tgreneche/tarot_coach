<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
  </defs>
  <!-- Green gradient background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <!-- Gold "T" letter in Playfair Display style (serif) -->
  <text x="512" y="620" text-anchor="middle"
        font-family="Playfair Display, Georgia, serif"
        font-size="620" font-weight="700"
        fill="#D4A843">T</text>
  <!-- Subtle gold underline accent -->
  <rect x="312" y="740" width="400" height="6" rx="3" fill="#D4A843" opacity="0.8"/>
</svg>
