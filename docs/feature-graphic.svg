<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <!-- ============================================================
       Coach Tarot — Feature graphic Play Store (1024 × 500)

       Comment exporter en PNG :
       1) Ouvrir ce fichier dans Chrome/Firefox/Edge
       2) Le navigateur affiche le SVG à 1024×500 exact
       3) Clic droit sur l'image > "Enregistrer l'image sous..."
          (ou capture de l'onglet via une extension type "Awesome Screenshot",
           ou utiliser https://svgtopng.com pour une conversion en ligne)
       4) Sauvegarder en feature-graphic.png à uploader dans Play Console
       ============================================================ -->

  <defs>
    <!-- Dégradé du tapis vert -->
    <radialGradient id="bgGrad" cx="30%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="60%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#0D3B0F"/>
    </radialGradient>

    <!-- Ombre des cartes -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dx="2" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Reflet doré -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C757"/>
      <stop offset="50%" stop-color="#D4A437"/>
      <stop offset="100%" stop-color="#B58820"/>
    </linearGradient>

    <!-- Texture pointillée discrète -->
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.6" fill="#D4A437" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Fond : tapis vert -->
  <rect width="1024" height="500" fill="url(#bgGrad)"/>
  <rect width="1024" height="500" fill="url(#dots)"/>

  <!-- Cadre subtil doré -->
  <rect x="6" y="6" width="1012" height="488" rx="8" fill="none"
        stroke="#D4A437" stroke-opacity="0.25" stroke-width="2"/>

  <!-- =========== Cartes décoratives (gauche) =========== -->
  <g transform="translate(80, 90)" filter="url(#cardShadow)">
    <!-- Carte du fond (atout) -->
    <g transform="rotate(-18 110 175)">
      <rect x="0" y="0" width="220" height="320" rx="14" fill="#FAF8F0" stroke="#D4A437" stroke-width="3"/>
      <rect x="14" y="14" width="192" height="292" rx="8" fill="none" stroke="#D4A437" stroke-opacity="0.4" stroke-width="1"/>
      <!-- Numéro 21 (atout maître) -->
      <text x="110" y="120" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="84" font-weight="700" fill="url(#goldGrad)">21</text>
      <text x="110" y="160" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="18" font-weight="600" fill="#1B5E20">ATOUT</text>
      <!-- Étoile -->
      <g transform="translate(110, 220)">
        <polygon points="0,-35 8,-11 32,-11 13,5 21,28 0,15 -21,28 -13,5 -32,-11 -8,-11"
                 fill="url(#goldGrad)" stroke="#1B5E20" stroke-width="1.5"/>
      </g>
    </g>

    <!-- Carte du milieu (Roi de cœur) -->
    <g transform="translate(60, 25) rotate(-3 110 175)">
      <rect x="0" y="0" width="220" height="320" rx="14" fill="#FAF8F0" stroke="#D4A437" stroke-width="3"/>
      <rect x="14" y="14" width="192" height="292" rx="8" fill="none" stroke="#D4A437" stroke-opacity="0.4" stroke-width="1"/>
      <text x="35" y="50" font-family="'Playfair Display', Georgia, serif" font-size="34" font-weight="700" fill="#C62828">R</text>
      <text x="35" y="82" font-family="'Playfair Display', Georgia, serif" font-size="28" fill="#C62828">♥</text>
      <text x="110" y="195" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="96" fill="#C62828">♥</text>
      <text x="185" y="305" text-anchor="end" font-family="'Playfair Display', Georgia, serif" font-size="34" font-weight="700" fill="#C62828" transform="rotate(180 185 295)">R</text>
    </g>

    <!-- Carte du dessus (Excuse) -->
    <g transform="translate(135, 60) rotate(14 110 175)">
      <rect x="0" y="0" width="220" height="320" rx="14" fill="#FAF8F0" stroke="#D4A437" stroke-width="3"/>
      <rect x="14" y="14" width="192" height="292" rx="8" fill="none" stroke="#D4A437" stroke-opacity="0.4" stroke-width="1"/>
      <!-- Symbole Excuse : étoile + musique -->
      <g transform="translate(110, 160)">
        <circle r="62" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
        <text x="0" y="22" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="78" font-weight="700" fill="url(#goldGrad)">🃏</text>
      </g>
      <text x="110" y="260" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="22" font-weight="600" fill="#1B5E20">EXCUSE</text>
    </g>
  </g>

  <!-- =========== Titre + tagline (droite) =========== -->
  <g transform="translate(540, 0)">
    <!-- Pictogramme/emoji décoratif -->
    <text x="0" y="150" font-family="'Playfair Display', Georgia, serif" font-size="48">🃏</text>

    <!-- Titre principal -->
    <text x="0" y="225" font-family="'Playfair Display', Georgia, serif" font-size="72" font-weight="700" fill="#FFFFFF">
      Coach Tarot
    </text>

    <!-- Ligne dorée d'accent -->
    <rect x="0" y="245" width="120" height="4" fill="url(#goldGrad)" rx="2"/>

    <!-- Tagline -->
    <text x="0" y="295" font-family="'Inter', 'Segoe UI', sans-serif" font-size="22" font-weight="500" fill="#FAF8F0" opacity="0.95">
      L'assistant intelligent
    </text>
    <text x="0" y="325" font-family="'Inter', 'Segoe UI', sans-serif" font-size="22" font-weight="500" fill="#FAF8F0" opacity="0.95">
      pour vos parties de Tarot
    </text>

    <!-- Badges fonctionnalités -->
    <g transform="translate(0, 365)">
      <!-- Badge 1 -->
      <g>
        <rect x="0" y="0" width="135" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.1" stroke="#D4A437" stroke-opacity="0.5" stroke-width="1"/>
        <text x="67.5" y="23" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" font-weight="600" fill="#FAF8F0">🎯 Analyse main</text>
      </g>
      <!-- Badge 2 -->
      <g transform="translate(150, 0)">
        <rect x="0" y="0" width="135" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.1" stroke="#D4A437" stroke-opacity="0.5" stroke-width="1"/>
        <text x="67.5" y="23" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" font-weight="600" fill="#FAF8F0">📊 Scoring auto</text>
      </g>
      <!-- Badge 3 -->
      <g transform="translate(300, 0)">
        <rect x="0" y="0" width="135" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.1" stroke="#D4A437" stroke-opacity="0.5" stroke-width="1"/>
        <text x="67.5" y="23" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" font-weight="600" fill="#FAF8F0">📈 Statistiques</text>
      </g>
    </g>
  </g>
</svg>
